<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>あなたクローゼット</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Hiragino Sans', sans-serif;
  background: #1a1a1a;
  color: #f0e6d3;
  min-height: 100vh;
  padding-bottom: 100px;
}
header {
  background: #111;
  padding: 16px 20px;
  text-align: center;
  border-bottom: 1px solid #c9a96e44;
  position: sticky;
  top: 0;
  z-index: 50;
}
header h1 { font-size: 20px; color: #c9a96e; letter-spacing: 3px; }
.add-btn {
  position: fixed;
  bottom: 24px;
  right: 24px;
  background: #c9a96e;
  color: #111;
  border: none;
  border-radius: 50%;
  width: 60px;
  height: 60px;
  font-size: 28px;
  cursor: pointer;
  box-shadow: 0 4px 16px rgba(0,0,0,0.4);
  z-index: 100;
}
.modal {
  display: none;
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.8);
  z-index: 200;
  justify-content: center;
  align-items: flex-end;
}
.modal.show { display: flex; }
.modal-content {
  background: #222;
  width: 100%;
  max-width: 500px;
  border-radius: 20px 20px 0 0;
  padding: 24px;
  max-height: 90vh;
  overflow-y: auto;
}
.modal-content h2 { color: #c9a96e; margin-bottom: 16px; font-size: 16px; letter-spacing: 2px; }
.photo-buttons { display: flex; gap: 10px; margin-bottom: 12px; }
.photo-btn {
  flex: 1;
  padding: 12px;
  background: #333;
  border: 1px solid #c9a96e44;
  border-radius: 10px;
  color: #f0e6d3;
  font-size: 13px;
  cursor: pointer;
  text-align: center;
}
.photo-hint {
  font-size: 11px;
  color: #888;
  text-align: center;
  margin-bottom: 12px;
  line-height: 1.5;
}
.photo-preview {
  width: 100%;
  height: 200px;
  background: #333;
  border: 2px dashed #c9a96e44;
  border-radius: 12px;
  display: flex;
  justify-content: center;
  align-items: center;
  margin-bottom: 16px;
  overflow: hidden;
  position: relative;
}
.photo-preview img { width: 100%; height: 100%; object-fit: cover; }
.photo-preview span { color: #888; font-size: 14px; }
.center-guide {
  position: absolute;
  top: 25%;
  left: 25%;
  width: 50%;
  height: 50%;
  border: 2px dashed #c9a96e88;
  border-radius: 8px;
  pointer-events: none;
}
.center-guide-label {
  position: absolute;
  bottom: -20px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 10px;
  color: #c9a96e88;
  white-space: nowrap;
}
input[type="file"] { display: none; }
select, input[type="text"] {
  width: 100%;
  padding: 10px 14px;
  background: #333;
  border: 1px solid #c9a96e44;
  border-radius: 10px;
  color: #f0e6d3;
  font-size: 14px;
  margin-bottom: 12px;
}
select option { background: #333; }
.taste-section { margin-bottom: 12px; }
.taste-section label { font-size: 12px; color: #c9a96e; display: block; margin-bottom: 8px; }
.taste-tags { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 8px; }
.taste-tag {
  padding: 6px 12px;
  border-radius: 20px;
  border: 1px solid #c9a96e44;
  background: transparent;
  color: #c9a96e;
  font-size: 12px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 6px;
}
.taste-tag.selected { background: #c9a96e; color: #111; }
.add-taste-row { display: flex; gap: 8px; }
.add-taste-row input { flex: 1; margin-bottom: 0; padding: 8px 12px; font-size: 13px; }
.add-taste-row button {
  padding: 8px 14px;
  background: #c9a96e;
  color: #111;
  border: none;
  border-radius: 10px;
  font-size: 13px;
  cursor: pointer;
}
.btn-row { display: flex; gap: 10px; margin-top: 16px; }
.btn-save {
  flex: 1; padding: 12px;
  background: #c9a96e; color: #111;
  border: none; border-radius: 10px;
  font-size: 15px; font-weight: bold; cursor: pointer;
}
.btn-cancel {
  flex: 1; padding: 12px;
  background: #333; color: #f0e6d3;
  border: none; border-radius: 10px;
  font-size: 15px; cursor: pointer;
}
.filter-row {
  display: flex;
  gap: 8px;
  padding: 12px 16px;
  overflow-x: auto;
}
.filter-btn {
  padding: 6px 14px;
  border-radius: 20px;
  border: 1px solid #c9a96e44;
  background: transparent;
  color: #c9a96e;
  font-size: 12px;
  cursor: pointer;
  white-space: nowrap;
}
.filter-btn.active { background: #c9a96e; color: #111; }
.color-notice {
  font-size: 11px;
  color: #888;
  padding: 0 16px 10px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.color-notice-dot {
  display: inline-block;
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: linear-gradient(135deg, #e74c3c, #3498db, #2ecc71);
  flex-shrink: 0;
  border: 1px solid #ffffff33;
}
.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
  padding: 16px;
}
.card {
  background: #222;
  border-radius: 12px;
  overflow: hidden;
  border: 1px solid #c9a96e22;
  position: relative;
}
.card img { width: 100%; aspect-ratio: 3/4; object-fit: cover; }
.card-info { padding: 10px; }
.card-category { font-size: 11px; color: #c9a96e; letter-spacing: 1px; margin-bottom: 2px; }
.card-season { font-size: 11px; color: #888; margin-top: 2px; }
.card-taste { font-size: 11px; color: #c9a96e88; margin-top: 2px; }
.card-color {
  display: inline-block;
  width: 10px;
  height: 10px;
  border-radius: 50%;
  margin-right: 4px;
  vertical-align: middle;
  border: 1px solid #ffffff33;
  flex-shrink: 0;
}
.card-delete {
  position: absolute;
  top: 8px;
  right: 8px;
  background: rgba(0,0,0,0.6);
  border: none;
  border-radius: 50%;
  width: 28px;
  height: 28px;
  color: white;
  font-size: 14px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}
.empty {
  text-align: center;
  padding: 60px 20px;
  color: #555;
  font-size: 14px;
  grid-column: span 2;
}
</style>
</head>
<body>

<header>
  <h1>あなたクローゼット</h1>
</header>

<div class="filter-row">
  <button class="filter-btn active" onclick="filterItems('全て')">全て</button>
  <button class="filter-btn" onclick="filterItems('トップス')">トップス</button>
  <button class="filter-btn" onclick="filterItems('ボトムス')">ボトムス</button>
  <button class="filter-btn" onclick="filterItems('ワンピース')">ワンピース</button>
  <button class="filter-btn" onclick="filterItems('アウター')">アウター</button>
  <button class="filter-btn" onclick="filterItems('シューズ')">シューズ</button>
</div>

<div class="color-notice">
  <span class="color-notice-dot"></span>
  カード左上の丸は、写真から自動診断したメインカラーです
</div>

<div class="grid" id="grid"></div>

<button class="add-btn" onclick="openModal()">＋</button>

<div class="modal" id="modal">
  <div class="modal-content">
    <h2>服を追加する</h2>

    <div class="photo-buttons">
      <div class="photo-btn" onclick="document.getElementById('cameraInput').click()">📷 カメラで撮影</div>
      <div class="photo-btn" onclick="document.getElementById('albumInput').click()">🖼️ アルバムから選ぶ</div>
    </div>

    <p class="photo-hint">⚠ 色の自動分析は写真中央のアイテムを基準にします。<br>アイテムが中央に映るように撮影してください。</p>

    <input type="file" id="cameraInput" accept="image/*" capture="environment" onchange="previewPhoto(event)">
    <input type="file" id="albumInput" accept="image/*" onchange="previewPhoto(event)">

    <div class="photo-preview" id="photoPreview">
      <span>写真を選んでください</span>
    </div>

    <select id="category">
      <option value="">カテゴリを選ぶ</option>
      <option>トップス</option>
      <option>ボトムス</option>
      <option>ワンピース</option>
      <option>アウター</option>
      <option>シューズ</option>
    </select>

    <select id="season">
      <option value="">季節を選ぶ</option>
      <option>春夏</option>
      <option>秋冬</option>
      <option>オールシーズン</option>
    </select>

    <select id="tasteSelect">
      <option value="">テイストを選ぶ</option>
    </select>

    <div class="taste-section">
      <label>テイストを追加・削除</label>
      <div class="taste-tags" id="tasteTags"></div>
      <div class="add-taste-row">
        <input type="text" id="newTasteInput" placeholder="テイストを追加">
        <button onclick="addTaste()">追加</button>
      </div>
    </div>

    <input type="text" id="memo" placeholder="メモ（任意）">

    <div class="btn-row">
      <button class="btn-cancel" onclick="closeModal()">キャンセル</button>
      <button class="btn-save" onclick="saveItem()">保存する</button>
    </div>
  </div>
</div>

<script>
let items = JSON.parse(localStorage.getItem('closet_items') || '[]');
let tastes = JSON.parse(localStorage.getItem('closet_tastes') || '["カジュアル","フェミニン","ストリート","フォーマル"]');
let currentFilter = '全て';
let currentPhoto = null;
let currentColor = null;

function saveTastes() {
  localStorage.setItem('closet_tastes', JSON.stringify(tastes));
}

function renderTasteSelect() {
  const sel = document.getElementById('tasteSelect');
  const current = sel.value;
  sel.innerHTML = '<option value="">テイストを選ぶ</option>' +
    tastes.map(t => `<option value="${t}" ${current === t ? 'selected' : ''}>${t}</option>`).join('');
}

function renderTasteTags() {
  const container = document.getElementById('tasteTags');
  container.innerHTML = tastes.map(t => `
    <button class="taste-tag" onclick="deleteTaste(event,'${t}')">
      ${t} <span style="font-size:14px">×</span>
    </button>
  `).join('');
}

function deleteTaste(e, t) {
  e.stopPropagation();
  if (confirm(`「${t}」を削除しますか？`)) {
    tastes = tastes.filter(x => x !== t);
    saveTastes();
    renderTasteSelect();
    renderTasteTags();
  }
}

function addTaste() {
  const input = document.getElementById('newTasteInput');
  const val = input.value.trim();
  if (!val) return;
  if (tastes.includes(val)) { alert('すでに存在します！'); return; }
  tastes.push(val);
  saveTastes();
  input.value = '';
  renderTasteSelect();
  renderTasteTags();
}

function extractColor(dataUrl, callback) {
  const img = new Image();
  img.onload = function() {
    const canvas = document.createElement('canvas');
    const size = 100;
    canvas.width = size; canvas.height = size;
    const ctx = canvas.getContext('2d');
    const cx = img.width * 0.25;
    const cy = img.height * 0.25;
    const cw = img.width * 0.5;
    const ch = img.height * 0.5;
    ctx.drawImage(img, cx, cy, cw, ch, 0, 0, size, size);
    const data = ctx.getImageData(0, 0, size, size).data;
    let r = 0, g = 0, b = 0, count = 0;
    for (let i = 0; i < data.length; i += 16) {
      r += data[i]; g += data[i+1]; b += data[i+2]; count++;
    }
    r = Math.round(r/count); g = Math.round(g/count); b = Math.round(b/count);
    callback(`rgb(${r},${g},${b})`);
  };
  img.src = dataUrl;
}

function compressImage(file, callback) {
  const reader = new FileReader();
  reader.onload = function(e) {
    const img = new Image();
    img.onload = function() {
      const canvas = document.createElement('canvas');
      const MAX = 600;
      let w = img.width, h = img.height;
      if (w > h) { if (w > MAX) { h = h * MAX / w; w = MAX; } }
      else { if (h > MAX) { w = w * MAX / h; h = MAX; } }
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      callback(canvas.toDataURL('image/jpeg', 0.7));
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function previewPhoto(e) {
  const file = e.target.files[0];
  if (!file) return;
  compressImage(file, function(compressed) {
    currentPhoto = compressed;
    const preview = document.getElementById('photoPreview');
    preview.innerHTML = `
      <img src="${compressed}">
      <div class="center-guide">
        <span class="center-guide-label">この範囲で色を分析</span>
      </div>
    `;
    extractColor(compressed, function(color) {
      currentColor = color;
    });
  });
}

function openModal() {
  currentPhoto = null;
  currentColor = null;
  renderTasteSelect();
  renderTasteTags();
  document.getElementById('modal').classList.add('show');
}

function closeModal() {
  document.getElementById('modal').classList.remove('show');
  document.getElementById('cameraInput').value = '';
  document.getElementById('albumInput').value = '';
  document.getElementById('category').value = '';
  document.getElementById('season').value = '';
  document.getElementById('tasteSelect').value = '';
  document.getElementById('memo').value = '';
  document.getElementById('newTasteInput').value = '';
  document.getElementById('photoPreview').innerHTML = '<span>写真を選んでください</span>';
  currentPhoto = null;
  currentColor = null;
}

function saveItem() {
  const category = document.getElementById('category').value;
  const season = document.getElementById('season').value;
  const taste = document.getElementById('tasteSelect').value;
  const memo = document.getElementById('memo').value;
  if (!currentPhoto) { alert('写真を選んでください！'); return; }
  if (!category) { alert('カテゴリを選んでください！'); return; }
  if (!season) { alert('季節を選んでください！'); return; }
  const item = {
    id: Date.now(),
    photo: currentPhoto,
    color: currentColor,
    category, season, taste, memo
  };
  items.push(item);
  try {
    localStorage.setItem('closet_items', JSON.stringify(items));
    closeModal();
    renderGrid();
  } catch(e) {
    alert('保存できませんでした。写真が多すぎる可能性があります。');
    items.pop();
  }
}

function deleteItem(id) {
  if (confirm('この服を削除しますか？')) {
    items = items.filter(i => i.id !== id);
    localStorage.setItem('closet_items', JSON.stringify(items));
    renderGrid();
  }
}

function filterItems(filter) {
  currentFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.classList.toggle('active', btn.textContent.trim() === filter);
  });
  renderGrid();
}

function renderGrid() {
  const grid = document.getElementById('grid');
  const filtered = currentFilter === '全て' ? items : items.filter(i => i.category === currentFilter);
  if (filtered.length === 0) {
    grid.innerHTML = '<div class="empty">まだ服が登録されていません！<br>＋ボタンから追加してね</div>';
    return;
  }
  grid.innerHTML = filtered.map(item => `
    <div class="card">
      <img src="${item.photo}" alt="${item.category}">
      <button class="card-delete" onclick="deleteItem(${item.id})">×</button>
      <div class="card-info">
        <div class="card-category">
          ${item.color ? `<span class="card-color" style="background:${item.color}"></span>` : ''}
          ${item.category}
        </div>
        <div class="card-season">${item.season}</div>
        ${item.taste ? `<div class="card-taste">${item.taste}</div>` : ''}
        ${item.memo ? `<div class="card-season">${item.memo}</div>` : ''}
      </div>
    </div>
  `).join('');
}

renderGrid();
</script>
</body>
</html>
